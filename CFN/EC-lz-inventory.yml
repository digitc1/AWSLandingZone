AWSTemplateFormatVersion: 2010-09-09

#   --------------------------------------------------------
#   Version History
#
#   v1.0.0    J. Silva          Initial Version
#   --------------------------------------------------------

Description: >-
    Creates 1 lambda and respective ancilliaries to generate a SECLZ status report

Metadata:
  'AWS::CloudFormation::Interface':
    ParameterGroups:
    - Label:
        default: 'Code location'
      Parameters:
      - inventoryLambdaCodeURI

Parameters:
  lambdaLogLevel:
    Description: 'Lambda logging level'
    Type: String
    Default: 'INFO'

  FilesRetentionInDays:
      Description: 'Specifies the number of days you want to retain inventory files in the SLZ S3 bucket.'
      Type: Number
      Default: 1
      AllowedValues: [1, 2, 3]
   
  AllowedRequestor:
    Description: 'Account Id allowed to request the Inventory'
    Type: String
    Default: '126027396100'

Resources:

  #   -------------------
  #   Inventory Queue
  #   -------------------
  InventoryQueue: 
    Type: AWS::SQS::Queue
    Properties: 
      QueueName: 
        Fn::Join:
          - ""
          - - "SecLZInventory-"
            - Ref: AWS::AccountId

  #   -------------------
  #   Inventory Queue role
  #   -------------------
  InventoryQueueRole: 
    Type: AWS::IAM::Role
    DependsOn:
      - InventoryQueue
    Properties:
      RoleName: LZInventoryRole
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              AWS:
                - !Sub "arn:aws:iam::${AllowedRequestor}:root"
                - !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action:
              - sts:AssumeRole
      Description: Role for a approved accounts to request LZ Inventory
      Policies:
        - PolicyName: root
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
            - Sid: LZInventoryGetQueueAttributes
              Effect: Allow
              Action: sqs:GetQueueAttributes
              Resource: InventoryQueue.Arn
            - Sid: LZInventorySendMessage
              Effect: Allow
              Action: sqs:SendMessage
              Resource: InventoryQueue.Arn
#            - Sid: LZInventoryReceiveMessage
#              Effect: Allow
#              Action: sqs:ReceiveMessage
#              Resource: InventoryQueue.Arn
#            - Sid: LZInventoryDeleteMessage
#              Effect: Allow
#              Action: sqs:DeleteMessage
#              Resource: InventoryQueue.Arn

  #   -------------------
  #   Inventory Lambda Execution role
  #   -------------------

  InventoryLambdaExecutionRole:
    Type: 'AWS::IAM::Role'
    DependsOn:
      - InventoryQueue
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - 'sts:AssumeRole'
      Path: /
      Policies:
        - PolicyName: root
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - account:GetAlternateContact
                  - ssm:GetParameter
                  - logs:PutLogEvents
                Resource: 
                  - !Sub 'arn:aws:ssm:*:${AWS::AccountId}:parameter/*'
                  - !Sub 'arn:aws:account::${AWS::AccountId}:account'
                  - !Sub 'arn:aws:logs:eu-west-1:${AWS::AccountId}:log-group:/aws/lambda//SECLZ-Inventory:*'
              - Effect: Allow
                Action:
                  - 'logs:CreateLogGroup'
                Resource:
                  Fn::Join:
                    - ""
                    - - "arn:aws:logs:"
                      - Ref: ${AWS::Region}
                      - ":"
                      - Ref: AWS::AccountId
                      - ":log-group:*"
              - Effect: Allow
                Action:
                  - 'cloudformation:ListStacks'
                  - 's3:GetBucketTagging'
                  - 'guardduty:ListDetectors'
                  - 'securityhub:DescribeHub'
                  - 'cloudformation:ListStackInstances'
                  - 'config:DescribeDeliveryChannels'
                  - 'account:ListRegions'
                  - 'cloudwatch:GetMetricStatistics'
                  - 'guardduty:GetDetector'
                  - 'cloudtrail:DescribeTrails'
                  - 's3:GetEncryptionConfiguration'
                  - 'config:DescribeConfigurationRecorders'
                  - 's3:ListAllMyBuckets'
                  - 'securityhub:ListMembers'
                  - 'cloudformation:ListStackSets'
                  - 'securityhub:GetFindings'
                  - 'guardduty:ListMembers'
                  - 'iam:GetAccountSummary'
                Resource: "*"
              - Effect: Allow
                Action:
                - 'cloudformation:ListStackSets'
                - 'cloudformation:ListStackInstances'
                Resource:
                - !Sub arn:aws:account::${AWS::AccountId}:account
                - !Sub arn:aws:cloudformation:*:${AWS::AccountId}:stackset/*:*
                - !Sub arn:aws:ssm:*:${AWS::AccountId}:parameter/*
                - Fn::Join:
                    - ""
                    - - "arn:aws:logs:"
                      - Ref: ${AWS::Region}
                      - ":"
                      - Ref: AWS::AccountId
                      - ":*"
        - PolicyName: allowSqs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
            - Effect: Allow
              Action:
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
              - sqs:ChangeMessageVisibility
              Resource: !GetAtt InventoryQueue.Arn
  

  #   -------------------
  #   Inventory function
  #   -------------------

  InventoryFunction:
    Type: 'AWS::Lambda::Function'
    DependsOn:
      - InventoryLambdaExecutionRole
    Properties:
      Code: ##inventoryLambdaCodeURI##
      Handler: 'SecLZInventory.lambda_handler'
      MemorySize: 128
      Role: !GetAtt InventoryLambdaExecutionRole.Arn
      Runtime: python3.9
      Timeout: 900
      Environment:
        Variables:
          LOG_LEVEL: !Ref lambdaLogLevel

  #   -------------------
  #   Event mapping
  #   -------------------
  InventoryFunctionEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      BatchSize: 10
      Enabled: true
      EventSourceArn: !GetAtt InventoryQueue.Arn
      FunctionName: !GetAtt InventoryFunction.Arn

  

  #   -------------------
  #   Inventory log group
  #   -------------------

  CloudTrailLogShipperLogGroup:
    Type: AWS::Logs::LogGroup
    DependsOn: InventoryFunction
    Properties:
      LogGroupName:
        Fn::Join:
        - ''
        - - "/aws/lambda/"
          - Ref: InventoryFunction
      RetentionInDays: 14

Outputs:
  inventoryFunctionArn:
    Description: ARN for InventoryFunction
    Value: !GetAtt InventoryFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-InventoryFunctionArn"

